<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coding Agent Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #0f1117;
    --bg-panel: #161b22;
    --bg-elevated: #1c2128;
    --bg-hover: #21262d;
    --bg-active: #2d333b;
    --border: #30363d;
    --border-subtle: #21262d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-subtle: #1f3a5f;
    --green: #3fb950;
    --orange: #d29922;
    --purple: #bc8cff;
    --red: #f85149;
    --yellow: #e3b341;
    --user-bg: #1c2128;
    --assistant-bg: #161b22;
    --tool-bg: #0d1117;
    --thinking-bg: #1a1a2e;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    font-size: 13px;
    overflow: hidden;
  }

  /* ─── Layout ─── */
  #app {
    display: grid;
    grid-template-columns: 240px 300px 1fr;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }

  #header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    -webkit-app-region: drag;
  }

  #header .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
  }

  #header .logo svg {
    color: var(--accent);
  }

  #header .subtitle {
    color: var(--text-muted);
    font-size: 12px;
  }

  /* ─── Panels ─── */
  #projects-panel {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sessions-panel {
    background: var(--bg-base);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #conversation-panel {
    background: var(--bg-base);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-header .count {
    background: var(--bg-active);
    color: var(--text-secondary);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }

  .panel-header-main {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #session-kind-filter {
    background: var(--bg-active);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px;
    padding: 2px 6px;
    text-transform: none;
    letter-spacing: 0;
  }

  #session-kind-filter:focus {
    outline: none;
    border-color: var(--accent);
  }

  .panel-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .panel-list::-webkit-scrollbar { width: 6px; }
  .panel-list::-webkit-scrollbar-track { background: transparent; }
  .panel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ─── Project Items ─── */
  .project-item {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-subtle);
    transition: background 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .project-item:hover { background: var(--bg-hover); }
  .project-item.active { background: var(--accent-subtle); border-left: 2px solid var(--accent); padding-left: 10px; }

  .project-item-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--bg-active);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 1px;
  }

  .project-item-body { min-width: 0; flex: 1; }

  .project-item-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .project-item-path {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Cascadia Code', Consolas, monospace;
  }

  .project-item-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── Path Bar ─── */
  #path-bar {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }

  #path-bar.visible { display: flex; }

  #path-bar-text {
    flex: 1;
    font-size: 11px;
    font-family: 'Cascadia Code', Consolas, monospace;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  #path-bar-text.unresolved { color: var(--text-muted); font-style: italic; }

  #vscode-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: var(--bg-active);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-secondary);
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.1s;
    flex-shrink: 0;
  }

  #vscode-btn:hover { border-color: #007acc; color: #007acc; }
  #vscode-btn.disabled { opacity: 0.4; pointer-events: none; }

  #resume-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: var(--bg-active);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-secondary);
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  #resume-btn:hover { border-color: var(--green); color: var(--green); }
  #resume-btn.disabled { opacity: 0.4; pointer-events: none; }

  /* ─── Session Items ─── */
  .session-item {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-subtle);
    transition: background 0.1s;
  }

  .session-item:hover { background: var(--bg-hover); }
  .session-item.active { background: var(--accent-subtle); border-left: 2px solid var(--accent); padding-left: 10px; }

  .session-item-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .session-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .session-badge.file { background: #1a3a2e; color: var(--green); }
  .session-badge.folder { background: #2a1f1a; color: var(--orange); }
  .session-badge.source { background: #1b2938; color: var(--accent); }

  .session-badge.source-icon {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .agent-source-icon {
    display: block;
  }

  .session-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }

  .session-summary {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .session-summary.no-content {
    color: var(--text-muted);
    font-style: italic;
  }

  .session-subagents {
    margin-top: 6px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .subagent-chip {
    font-size: 10px;
    padding: 2px 6px;
    background: var(--bg-active);
    color: var(--text-secondary);
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.1s;
  }

  .subagent-chip:hover { border-color: var(--accent); color: var(--accent); }
  .subagent-chip.active { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); }

  /* ─── Conversation Panel ─── */
  #conv-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #conv-header-info { min-width: 0; flex: 1; }

  #conv-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #conv-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  #conv-stats {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .stat-pill {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-secondary);
  }

  #conv-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #conv-body::-webkit-scrollbar { width: 6px; }
  #conv-body::-webkit-scrollbar-track { background: transparent; }
  #conv-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ─── Message Bubbles ─── */
  .msg-group {
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border-subtle);
  }

  .msg-group.user { border-color: #2a3a4a; }
  .msg-group.assistant { border-color: var(--border-subtle); }

  .msg-role-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border-subtle);
  }

  .msg-group.user .msg-role-bar { background: #1a2433; color: var(--accent); }
  .msg-group.assistant .msg-role-bar { background: var(--bg-elevated); color: var(--purple); }

  .msg-role-bar .msg-time {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  .msg-body { padding: 12px; background: var(--bg-panel); }

  /* ─── Content Blocks ─── */
  .content-block { margin-bottom: 10px; }
  .content-block:last-child { margin-bottom: 0; }

  .text-block {
    line-height: 1.6;
    color: var(--text-primary);
    word-break: break-word;
    font-size: 13px;
  }

  /* ─── Markdown Styles ─── */
  .markdown-body { color: var(--text-primary); line-height: 1.6; font-size: 13px; }
  .markdown-body p { margin: 0 0 10px; }
  .markdown-body p:last-child { margin-bottom: 0; }
  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    color: var(--text-primary);
    font-weight: 600;
    margin: 16px 0 8px;
    line-height: 1.3;
  }
  .markdown-body h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .markdown-body h2 { font-size: 16px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 4px; }
  .markdown-body h3 { font-size: 14px; }
  .markdown-body h4, .markdown-body h5, .markdown-body h6 { font-size: 13px; }
  .markdown-body strong { font-weight: 600; color: var(--text-primary); }
  .markdown-body em { font-style: italic; color: var(--text-secondary); }
  .markdown-body a { color: var(--accent); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body ul, .markdown-body ol { padding-left: 20px; margin: 0 0 10px; }
  .markdown-body li { margin: 3px 0; }
  .markdown-body li > ul, .markdown-body li > ol { margin: 3px 0; }
  .markdown-body blockquote {
    margin: 8px 0;
    padding: 6px 12px;
    border-left: 3px solid var(--border);
    color: var(--text-secondary);
    background: var(--bg-elevated);
    border-radius: 0 4px 4px 0;
  }
  .markdown-body code {
    font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
    font-size: 11px;
    background: var(--bg-active);
    color: var(--purple);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .markdown-body pre {
    background: var(--tool-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .markdown-body pre::-webkit-scrollbar { height: 4px; }
  .markdown-body pre::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .markdown-body pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text-secondary);
    font-size: 11px;
    line-height: 1.5;
    white-space: pre;
  }
  .markdown-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }
  .markdown-body table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 12px;
  }
  .markdown-body th, .markdown-body td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    text-align: left;
  }
  .markdown-body th { background: var(--bg-elevated); font-weight: 600; }

  /* Thinking */
  .thinking-block {
    border: 1px solid #2a1f3d;
    border-radius: 6px;
    overflow: hidden;
  }

  .thinking-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: #1a1230;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    color: var(--purple);
    font-weight: 500;
  }

  .thinking-header:hover { background: #211540; }
  .thinking-header .chevron { transition: transform 0.15s; }
  .thinking-header.expanded .chevron { transform: rotate(90deg); }

  .thinking-content {
    display: none;
    padding: 10px;
    background: #120d1e;
    color: #9d7fd4;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    font-style: italic;
    border-top: 1px solid #2a1f3d;
  }

  .thinking-content.visible { display: block; }

  /* Tool Use */
  .tool-use-block {
    border: 1px solid #1f2d1f;
    border-radius: 6px;
    overflow: hidden;
  }

  .tool-use-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: #111c11;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    font-weight: 500;
  }

  .tool-use-header:hover { background: #162116; }
  .tool-use-header .tool-name { color: var(--green); }
  .tool-use-header .tool-id { color: var(--text-muted); font-size: 10px; font-family: monospace; }
  .tool-use-header .chevron { transition: transform 0.15s; margin-left: auto; color: var(--text-muted); }
  .tool-use-header.expanded .chevron { transform: rotate(90deg); }

  .tool-use-content {
    display: none;
    padding: 10px;
    background: var(--tool-bg);
    border-top: 1px solid #1f2d1f;
  }

  .tool-use-content.visible { display: block; }

  .tool-input-pre {
    font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
  }

  /* Tool Result */
  .tool-result-block {
    border: 1px solid #1f2a1a;
    border-radius: 6px;
    overflow: hidden;
  }

  .tool-result-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: #111811;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    font-weight: 500;
    color: var(--yellow);
  }

  .tool-result-header:hover { background: #151c12; }
  .tool-result-header .result-id { color: var(--text-muted); font-size: 10px; font-family: monospace; }
  .tool-result-header .chevron { transition: transform 0.15s; margin-left: auto; color: var(--text-muted); }
  .tool-result-header.expanded .chevron { transform: rotate(90deg); }

  .tool-result-content {
    display: none;
    padding: 10px;
    background: var(--tool-bg);
    border-top: 1px solid #1f2a1a;
  }

  .tool-result-content.visible { display: block; }

  .tool-result-pre {
    font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
    max-height: 400px;
    overflow-y: auto;
  }

  .tool-result-pre::-webkit-scrollbar { width: 4px; }
  .tool-result-pre::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── Empty / Loading States ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 8px;
    padding: 24px;
    text-align: center;
  }

  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 12px; line-height: 1.5; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 12px;
    gap: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  /* ─── Token Pill ─── */
  .token-pill {
    background: var(--bg-elevated) !important;
    border: 1px solid var(--border) !important;
    border-radius: 12px !important;
    color: var(--green) !important;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    padding: 2px 8px;
    transition: border-color 0.1s, color 0.1s;
  }
  .token-pill:hover { border-color: var(--green) !important; }

  /* ─── Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 640px;
    max-width: 90vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 13px;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 2px;
    display: flex;
    align-items: center;
    border-radius: 4px;
    transition: color 0.1s, background 0.1s;
  }
  .modal-close:hover { color: var(--text-primary); background: var(--bg-hover); }

  .modal-body {
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ─── Token Table ─── */
  .token-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .token-table th, .token-table td {
    padding: 8px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border-subtle);
  }
  .token-table th:first-child, .token-table td:first-child { text-align: left; }
  .token-table th {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    background: var(--bg-elevated);
  }
  .token-table tbody tr:hover { background: var(--bg-hover); }
  .token-table .model-cell {
    font-family: 'Cascadia Code', Consolas, monospace;
    font-size: 11px;
    color: var(--purple);
  }
  .token-table .cache { color: var(--text-muted); }
  .token-table .output { color: var(--green); }
  .token-table tfoot td {
    border-top: 1px solid var(--border);
    border-bottom: none;
    color: var(--text-primary);
    padding-top: 10px;
  }
</style>
<script src="node_modules/marked/lib/marked.umd.js"></script>
<script type="module" src="dist/renderer.js"></script>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      Coding Agent Hub
    </div>
    <span class="subtitle">Session Browser</span>
  </div>

  <!-- Projects Panel -->
  <div id="projects-panel">
    <div class="panel-header">
      Projects
      <span class="count" id="projects-count">–</span>
    </div>
    <div class="panel-list" id="projects-list">
      <div class="loading"><div class="spinner"></div> Loading…</div>
    </div>
  </div>

  <!-- Sessions Panel -->
  <div id="sessions-panel">
    <div class="panel-header">
      <div class="panel-header-main">
        <span>Sessions</span>
        <select id="session-kind-filter" aria-label="Filter session kind">
          <option value="all">All types</option>
          <option value="session">Session</option>
          <option value="agents">Agents</option>
        </select>
      </div>
      <span class="count" id="sessions-count">–</span>
    </div>
    <div id="path-bar">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--text-muted)"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
      <span id="path-bar-text"></span>
      <button id="vscode-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
        VS Code
      </button>
    </div>
    <div class="panel-list" id="sessions-list">
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h18M3 12h18M3 17h12"/></svg>
        <p>Select a project to view sessions</p>
      </div>
    </div>
  </div>

  <!-- Conversation Panel -->
  <div id="conversation-panel">
    <div id="conv-header">
      <div id="conv-header-info">
        <div id="conv-title">No session selected</div>
        <div id="conv-meta">Select a session from the list</div>
      </div>
      <div id="conv-stats"></div>
      <button id="resume-btn" class="disabled" onclick="window.resumeSession()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Resume
      </button>
    </div>
    <div id="conv-body">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <p>Select a project and session to view the conversation</p>
      </div>
    </div>
  </div>
</div>

<!-- Token Modal -->
<div id="token-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span>Token Usage Breakdown</span>
      <button id="token-modal-close" class="modal-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="token-modal-body"></div>
  </div>
</div>

</body>
</html>
